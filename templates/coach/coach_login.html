<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYX TACTICAL | COMMAND AUTHENTICATION</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='coach/css/coach_portal.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --tactical-yellow: #FACC15;
            --tactical-bg: #0A0A0A;
            --tactical-panel: rgba(20, 20, 20, 0.9);
            --tactical-border: rgba(250, 204, 21, 0.2);
            --tactical-glow: rgba(250, 204, 21, 0.15);
            --text-dim: #6B7280;
        }

        body {
            background: radial-gradient(circle at center, #151515 0%, #000 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #FFF;
        }

        /* ════ TACTICAL HUD ELEMENTS ════ */
        .hud-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(250, 204, 21, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(250, 204, 21, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .hud-scanline {
            position: fixed;
            top: 20%; left: 0; width: 100%; height: 2px;
            background: rgba(250, 204, 21, 0.05);
            z-index: 1;
        }

        /* ════ AUTH CONTAINER ════ */
        .auth-container {
            width: 440px;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background: var(--tactical-panel);
            border: 1px solid var(--tactical-border);
            border-radius: 24px;
            padding: 4rem 3.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 40px var(--tactical-glow);
            text-align: center;
        }

        .auth-header { margin-bottom: 3.5rem; }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--tactical-yellow);
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.65rem;
            letter-spacing: 4px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* ════ FORM ELEMENTS ════ */
        .form-group { margin-bottom: 1.75rem; text-align: left; }
        
        label {
            display: block;
            font-size: 0.6rem;
            font-weight: 950;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .tactical-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--tactical-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: #FFF;
            font-family: inherit;
            font-weight: 600;
            outline: none;
        }

        .tactical-input:focus {
            border-color: var(--tactical-yellow);
            box-shadow: 0 0 20px var(--tactical-glow);
        }

        .btn-action {
            width: 100%;
            background: var(--tactical-yellow);
            color: #000;
            border: none;
            padding: 1.1rem;
            border-radius: 14px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-action:hover {
            box-shadow: 0 15px 30px rgba(250, 204, 21, 0.3);
        }

        /* ════ MODES ════ */
        .auth-view {
            display: none;
        }
        .auth-view.active { display: block; }

        .footer-links {
            margin-top: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .link-item {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-dim);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            cursor: pointer;
        }

        .link-item:hover { color: var(--tactical-yellow); }

        #errorMessage {
            color: #FF4444;
            font-size: 0.65rem;
            margin-top: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
            background: rgba(255, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .success-box {
            background: rgba(34, 197, 94, 0.1);
            color: #22C55E;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(34, 197, 94, 0.2);
            margin-top: 2rem;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>
    <div class="hud-grid"></div>
    <div class="hud-scanline"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">NYX <span style="font-weight: 400;">COACH</span></div>
                <div class="subtitle" id="viewSubtitle">COMMAND_AUTHENTICATION</div>
            </div>

            <!-- LOGIN VIEW -->
            <div id="loginView" class="auth-view active">
                <form id="loginForm">
                    <div class="form-group">
                        <label>COMMAND_IDENTIFIER</label>
                        <input type="email" id="email" class="tactical-input" placeholder="coach@nyxft.com" required>
                    </div>
                    <div class="form-group">
                        <label>AUTHORIZATION_TOKEN</label>
                        <input type="password" id="password" class="tactical-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-action">
                        INITIATE_SESSION
                        <i class="ph-bold ph-key"></i>
                    </button>
                </form>
                <div class="footer-links">
                    <a class="link-item" onclick="switchView('recoveryView')">FORGOT_TOKEN?</a>
                </div>
            </div>

            <!-- RECOVERY VIEW -->
            <div id="recoveryView" class="auth-view">
                <div id="recoveryInitial">
                    <div class="form-group">
                        <label>REGISTERED_COMM_LINK</label>
                        <input type="email" id="recoveryEmail" class="tactical-input" placeholder="coach@nyxft.com">
                    </div>
                    <button class="btn-action" onclick="sendRecoverySignal()">
                        TRANSMIT_RECOVERY_SIGNAL
                        <i class="ph-bold ph-broadcast"></i>
                    </button>
                </div>
                <div id="recoverySuccess" style="display: none;">
                    <div class="success-box">
                        <i class="ph-bold ph-check-circle" style="font-size: 2rem; display: block; margin-bottom: 1rem;"></i>
                        RECOVERY_SIGNAL_TRANSMITTED
                        <p style="font-size: 0.6rem; color: var(--text-dim); margin-top: 0.5rem;">CHECK SECURE UPLINK FOR RESET PROTOCOL</p>
                    </div>
                </div>
                <div class="footer-links">
                    <a class="link-item" onclick="switchView('loginView')">RETURN_TO_COMMAND</a>
                </div>
            </div>

            <div id="errorMessage">INVALID_COMMAND_IDENTIFIER</div>
        </div>
    </div>

    <script>
        function switchView(viewId) {
            document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            const subtitle = document.getElementById('viewSubtitle');
            if(viewId === 'recoveryView') {
                subtitle.innerText = 'RECOVERY_PROTOCOL';
                subtitle.style.color = '#FACC15';
            } else {
                subtitle.innerText = 'COMMAND_AUTHENTICATION';
                subtitle.style.color = '#6B7280';
            }
            document.getElementById('errorMessage').style.display = 'none';
        }

        async function sendRecoverySignal() {
            const email = document.getElementById('recoveryEmail').value;
            if(!email.includes('@')) {
                const err = document.getElementById('errorMessage');
                err.innerText = 'INVALID_COMM_LINK';
                err.style.display = 'block';
                return;
            }
            
            // Simulation of transmission
            document.getElementById('recoveryInitial').style.display = 'none';
            document.getElementById('recoverySuccess').style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const err = document.getElementById('errorMessage');

            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'login', email, password })
            });

            const data = await res.json();
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                err.innerText = 'CREDENTIAL_MISMATCH // ACCESS_DENIED';
                err.style.display = 'block';
            }
        });
    </script>
</body>
</html>
